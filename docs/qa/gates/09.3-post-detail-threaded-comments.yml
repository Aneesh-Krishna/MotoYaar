concerns_resolution:
  - id: CONCERN-1
    severity: medium
    status: RESOLVED
    fix: >
      PostDetailView.tsx:213 — href sanitised with /^https?:\/\//i.test() check.
      Falls back to '#' for non-http/https schemes. javascript: injection prevented.

  - id: CONCERN-2
    severity: low
    status: RESOLVED
    fix: >
      communityService.ts:193-204 — addComment() now queries parent comment before inserting.
      Throws BadRequestError if: parent not found, parent belongs to different post,
      or parent is itself a reply (depth > 1). Three new unit tests cover all three paths.

  - id: CONCERN-3
    severity: low
    status: RESOLVED
    fix: >
      communityService.ts:109 — commentCount now uses reduce() to sum top-level + replies.
      PostDetailView.tsx:32-35 — totalCommentCount derived from commentList via same reduce.
      Comment count heading now reflects all comments consistently.

  - id: CONCERN-4
    severity: low
    status: RESOLVED
    fix: >
      CommentThread.tsx:56-58 — catch block added to handleSubmitReply.
      toast.error("Failed to post reply") shown on API failure.

  - id: CONCERN-5
    severity: low
    status: RESOLVED
    fix: >
      communityService.ts:151-155 — addReaction() now checks post existence first.
      Throws NotFoundError (→ 404) rather than letting FK constraint produce a 500.
      New unit test covers the non-existent post path.

  - id: CONCERN-6
    severity: low
    status: RESOLVED
    fix: >
      communityService.test.ts — 9 new tests added:
        getPost: found/not-found/userReaction-present/userReaction-absent/commentCount-with-replies (5)
        addComment: depth-enforcement × 3 (level3/cross-post/orphan)
        addReaction: non-existent post → NotFoundError (1)
      Total: 23/23 tests passing (was 14/14).

  - id: CONCERN-7
    severity: low
    status: RESOLVED
    fix: >
      src/components/ui/tooltip.tsx created using @radix-ui/react-tooltip (already in package.json).
      PostDetailView.tsx:147-157 — 'Edited' span now wrapped in TooltipProvider/Tooltip/TooltipTrigger/TooltipContent.
      Radix handles cross-platform accessibility including touch long-press.

test_results:
