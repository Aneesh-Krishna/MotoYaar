# ─── Bugs ─────────────────────────────────────────────────────────────────────

bugs:
  - id: B1
    severity: MEDIUM
    title: "Today's expiry date returns 'expiring' instead of 'expired'"
    ac_violated: AC4
    location: "src/services/documentService.ts — computeDocumentStatus, line 26"
    detail: >
      `if (daysUntilExpiry < 0) return "expired"` uses strict less-than.
      When daysUntilExpiry === 0 (expiry is today), condition is false and
      falls through to `<= notificationWindowDays` → returns "expiring" (amber).
      AC4 explicitly states "Red (expired or expiry date is today)".
    fix: "Change `< 0` to `<= 0` in computeDocumentStatus"
    blocking: true
    status: RESOLVED
    resolution: >
      Changed `daysUntilExpiry < 0` to `daysUntilExpiry <= 0`.
      Two boundary tests added and passing: "returns expired when expiry date is today"
      and "returns expired for a document whose expiry date is in the past".

# ─── Concerns (Advisory) ──────────────────────────────────────────────────────

concerns:
  - id: C1
    severity: LOW
    title: "'Replace' option missing from kebab menu"
    detail: >
      AC7 specifies "Replace option available" when storageUrl + full_storage pref.
      Implementation has View, Edit, Delete — no Replace item at all.
      Edit and Delete are acceptably stubbed (deferred to 4.4); Replace not even stubbed.
    recommendation: >
      Add a stubbed "Replace" DropdownMenu.Item (no-op comment or toast "Coming soon")
      to satisfy AC7 surface coverage. Wire in Story 4.4/4.5.
    blocking: false
    status: RESOLVED
    resolution: >
      Replace DropdownMenu.Item added to DocumentRow, gated on canView
      (storageUrl + full_storage pref). No-op stub with comment directing to Story 4.4/4.5.

  - id: C2
    severity: LOW
    title: "handleView async error silently unhandled in DocumentsTab"
    detail: >
      `getSignedUrl(docId)` rejection not caught in handleView; produces silent
      unhandled promise rejection. No user feedback on network error, 404, or auth failure.
    recommendation: "Wrap in try/catch, call toast.error() in UX hardening pass."
    blocking: false
    status: DEFERRED

  - id: C3
    severity: ADVISORY
    title: "Missing boundary tests for computeDocumentStatus"
    detail: >
      No test for daysUntilExpiry < 0 (past expiry → expired).
      No test for daysUntilExpiry === 0 (today → expired after B1 fix).
      Tests currently cover: null expiry, 10 days future, far future, forbidden, default window.
    recommendation: "Add both boundary cases alongside B1 fix."
    blocking: false
    status: RESOLVED
    resolution: >
      Two tests added to documentService.listByVehicle.test.ts:
      "returns expired when expiry date is today" and
      "returns expired for a document whose expiry date is in the past".
      119/119 tests passing.

  - id: C4
    severity: DOCUMENTATION
    title: "Signed URL route restricts to owner only — shared viewers excluded"
    detail: >
      GET /api/documents/[id]/url checks `doc.userId === session.user.id` only.
      Shared vehicle viewers (vehicleAccess table) cannot retrieve signed URLs
      even when they can list documents. May be intentional (owners only store files)
      but not explicitly documented.
    recommendation: >
      Add inline comment documenting the intent. Revisit when shared viewer
      scope for document access is defined.
    blocking: false
    status: RESOLVED
    resolution: >
      Inline comment added to GET /api/documents/[id]/url explaining owner-only
      restriction rationale and flagging for future shared-viewer story review.

