findings:
  - id: FINDING-1
    severity: medium
    title: "Vehicle removal silently does nothing"
    status: RESOLVED
    resolution: >
      updateTripSchema extended with vehicleId: z.string().uuid().nullable().optional().
      TripEditForm defaultValues changed to vehicleId: trip.vehicleId ?? null.
      Select onChange sends null on empty selection. handleSubmit no longer
      normalizes vehicleId to undefined. Service correctly treats null as explicit removal.

  - id: FINDING-2
    severity: low
    title: "Non-atomic trip + expense update"
    status: RESOLVED
    resolution: >
      tripService.update() now wraps trip update + expense update in db.transaction(),
      matching the create() pattern. Ownership check remains outside the transaction.

  - id: FINDING-3
    severity: low
    title: "Test 'vehicle removed' does not test actual vehicle removal"
    status: RESOLVED
    resolution: >
      Test renamed to 'sets expense vehicleId to null when vehicle explicitly removed'.
      Now passes vehicleId: null and asserts expense update receives vehicleId: null.
      Transaction mock updated throughout to use mockDbTransaction / mockTx.update.

