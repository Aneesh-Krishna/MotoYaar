# ─── Original must-fix items — all resolved ───────────────────────────────────

resolved_must_fix:
  - id: MF-1
    severity: SECURITY
    title: "tempR2Key not validated against owner's namespace"
    resolution: >
      Fixed in src/services/documentService.ts:63.
      Prefix check throws ForbiddenError before any R2 operation.
      Security test added in documentService.create.test.ts (2 cases).
    status: RESOLVED

  - id: MF-2
    severity: BUG
    title: "File input value not cleared on error return"
    resolution: >
      Fixed in src/components/documents/DocumentUpload.tsx.
      fileInputRef.current.value = "" applied in 4 error paths:
      invalid file type (L52), file too large (L57), no doc type selected
      (L63), and parse API catch block (L111).
    status: RESOLVED

# ─── Original should-fix items ────────────────────────────────────────────────

resolved_should_fix:
  - id: SF-1
    title: "AC4 — Screen 4 (save confirmation) missing"
    resolution: >
      Screen 4 added to DocumentUpload.tsx (L215-235). Displays CheckCircle,
      "Document saved!" heading, expiry date summary, and Done button that
      calls onSuccess(). handleSave now sets screen to "saved" instead of
      calling onSuccess() directly.
    status: RESOLVED

  - id: SF-2
    title: "AC1 — Add Vehicle Step 5 not wired"
    resolution: >
      Step5 component (L348-368) added to AddVehicleWizard with informative
      message: "Save your vehicle first, then add your RC, Insurance, and PUC.
      You'll land on the Documents tab right after saving."
      handleSave redirects to /garage/{id}?tab=documents (L547).
      Note: DocumentUpload is not embedded in the wizard — this is the
      correct approach since vehicleId is not known until after save.
      AC1 Add Vehicle Step 5 is now MET (with appropriate UX trade-off).
    status: RESOLVED

  - id: SF-3
    title: "AC5 — onManualEntry not passed in VehicleDetailTabs"
    resolution: >
      Intentionally deferred. Prop exists in DocumentUpload but wiring
      requires Story 4.2 manual date picker. Graceful fallback (empty
      confirm screen) is acceptable until 4.2 is built.
    status: DEFERRED
    deferred_to: "Story 4.2"

  - id: SF-4
    title: "capture=environment forces camera on iOS"
    resolution: >
      Removed from src/components/documents/DocumentUpload.tsx (L188).
      File input now allows both camera and gallery on all platforms.
    status: RESOLVED

  - id: SF-5
    title: "documentService.create() has zero unit test coverage"
    resolution: >
      src/services/__tests__/documentService.create.test.ts created with
      7 tests covering: parse_only delete, R2 delete failure non-blocking,
      full_storage copy+delete, ForbiddenError on invalid key, valid key
      passes, no-key path, user-not-found defaults.
    status: RESOLVED

  - id: SF-6
    title: "computeDocumentStatus with invalid date string returns 'valid'"
    resolution: >
      Fixed in documentService.ts:22 — isNaN(expiry.getTime()) guard returns
      "incomplete" before arithmetic. Two test cases added to
      documentService.test.ts covering "not-a-date" and "2027-99-99".
    status: RESOLVED

  - id: SF-7
    title: "No fetch timeout on parse API call"
    resolution: >
      Not addressed. Accepted as low-priority technical debt.
      Vercel's 60s function timeout provides an implicit upper bound.
      A future story can add AbortController + setTimeout if needed.
    status: OPEN
    priority: LOW

