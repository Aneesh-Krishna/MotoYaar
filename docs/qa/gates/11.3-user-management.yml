defects:
  - id: D1
    severity: MEDIUM
    status: RESOLVED
    required: true
    title: "AC #3 spec deviation — vehicle/post counts absent from search table"
    description: >
      Story AC and Dev Notes both list "Vehicles | Posts" as explicit table columns.
      Implementation shows Name | Email | Joined | Status in the main table only.
      Counts appear only in the on-demand inline expansion row.
      This is a reasonable N+1 avoidance strategy but was not documented as a
      deliberate deviation, and it does not satisfy AC #3 as written.
    resolution_options:
      - "Option A: Add vehicleCount + postCount to searchUsers() via subquery/JOIN and add columns to the table"
      - "Option B: PO formally waives AC #3 and updates story to document the lazy-load tradeoff"
    files:
      - src/app/admin/users/UsersClient.tsx
      - src/services/adminService.ts

  - id: D2
    severity: LOW
    status: RESOLVED
    required: false
    title: "Silent failure when inline detail fetch fails"
    description: >
      toggleExpand() in UsersClient.tsx does not handle fetch errors — the expansion
      row silently shows nothing if GET /api/admin/users/[id] throws or returns non-OK.
      User cannot distinguish fetch failure from empty data.
    fix: "Add error state to toggleExpand; render a brief error message in the expansion row"
    files:
      - src/app/admin/users/UsersClient.tsx

  - id: D3
    severity: LOW
    status: RESOLVED
    required: false
    title: "Search input missing aria-label"
    description: >
      The search <input> at UsersClient.tsx:139 has placeholder only.
      Screen readers require an explicit aria-label or associated <label>.
    fix: 'Add aria-label="Search users" to the input element'
    files:
      - src/app/admin/users/UsersClient.tsx

  - id: D4
    severity: LOW
    status: RESOLVED
    required: false
    title: "No q length guard on search API route"
    description: >
      GET /api/admin/users?q= has no max-length validation on q. Very long values
      trigger full-table ILIKE scans on three columns. Risk is low (admin-only endpoint)
      but inconsistent with the pattern established in Story 9.7.
    fix: "const q = (searchParams.get('q') ?? '').slice(0, 200)"
    files:
      - src/app/api/admin/users/route.ts

  - id: D5
    severity: LOW
    status: RESOLVED
    required: false
    title: "PATCH route validation paths lack automated tests"
    description: >
      The PATCH route validates action allowlist, suspendDays range, and googleId
      presence before delegating to the service. These 400-return paths are untested.
      The service-level equivalents are well covered.
    files:
      - src/app/api/admin/users/[id]/route.ts

informational:
  - "relink action has no googleId format validation — acceptable for admin-only internal tool"
  - "Warn action allowed on already-warned user — presumably intentional (no guard)"
  - "All 6 Radix Dialog modals rendered unconditionally in DOM — acceptable overhead for admin page"
  - "detail fetch on expand re-runs every open (not cached) — correct, ensures fresh data post-action"

risks:
