concerns:
  - id: C1
    severity: must-fix
    status: RESOLVED
    title: "No automated unit tests for update() / delete()"
    detail: >
      Story spec explicitly defined 7 test scenarios (3 for update, 4 for delete).
      None were written. Project has a clear established pattern of service unit tests
      (see documentService.create.test.ts). Ownership checks, status recomputation,
      and R2 cleanup logic are entirely unverified by automation.
    required_tests:
      - "update: updates type/expiryDate for document owner (vehicle-based)"
      - "update: throws ForbiddenError for non-owner"
      - "update: recomputes status when expiryDate changes (valid → expiring → expired)"
      - "delete: deletes document record for owner"
      - "delete: calls storageService.deleteFile when storageKey exists"
      - "delete: does not throw when R2 deletion fails (logged, DB delete proceeds)"
      - "delete: throws ForbiddenError for non-owner"
    file: "src/services/__tests__/documentService.update-delete.test.ts"

  - id: C2
    severity: must-fix
    status: RESOLVED
    title: "status and parseStatus corrupted on partial PATCH (undefined expiryDate)"
    detail: >
      In documentService.update() (documentService.ts:150-162):
        const newStatus = computeDocumentStatus(data.expiryDate ?? null, ...)
        parseStatus: data.expiryDate ? "manual" : "incomplete"
      When data.expiryDate is undefined (field not sent), both evaluate using null/falsy,
      setting status="incomplete" and parseStatus="incomplete" — even though the existing
      expiryDate is preserved in the DB via the fallback logic.
      In practice the frontend always sends expiryDate explicitly, so this won't trigger
      in the normal app flow. But it violates correct PATCH semantics and will bite any
      caller making a type-only update via API.
    fix: >
      Compute status from effective value:
        const effectiveExpiryDate = data.expiryDate !== undefined ? data.expiryDate : doc.expiryDate;
        const newStatus = computeDocumentStatus(effectiveExpiryDate, user?.notificationWindowDays ?? 30);
        // ...
        parseStatus: effectiveExpiryDate ? "manual" : "incomplete",

  - id: C3
    severity: concern
    status: RESOLVED
    title: '"Replace with new file" creates a duplicate document — old record not removed'
    detail: >
      DocumentEditForm renders <DocumentUpload onSuccess={onSaved} /> when showReupload=true.
      DocumentUpload calls POST /api/vehicles/${vehicleId}/documents — creates a new record.
      The original document being "edited" is never deleted. Vehicle ends up with two document
      records: the original (unchanged) plus the newly uploaded one. The story spec is ambiguous
      ("triggers AI parse again using the Story 4.1 flow") but user intent is replacement.
    fix_options:
      - "After DocumentUpload.onSuccess fires, call deleteDocument(document.id) then onSaved()"
      - "Wire tempR2Key through PATCH to update storage on the existing record (larger refactor)"
    recommended: "Option 1 — wrap onSuccess in DocumentEditForm to delete original first"

  - id: C4
    severity: advisory
    status: DEFERRED
    title: 'No label input for "Other" type documents in edit form'
    detail: >
      DocumentEditForm has no <input> for label when docType === "Other". Existing label is
      preserved silently in DB via data.label ?? doc.label fallback. Users cannot change the
      label of an "Other" document, and changing type away from "Other" leaves the label in DB.
      Low risk for MVP.

  - id: C5
    severity: advisory
    status: DEFERRED
    title: "Orphaned vehicle record throws ForbiddenError instead of 500/404"
    detail: >
      If doc.vehicleId is set but the vehicle row doesn't exist (orphaned after data anomaly),
      update() and delete() throw ForbiddenError (403). Since vehicle deletes cascade to documents
      this scenario is extremely unlikely in practice. Advisory only.

