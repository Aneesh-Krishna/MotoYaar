# FINDINGS SUMMARY
# ──────────────────────────────────────────────
findings:
  critical: []

  high: []

  recommendations:
    - id: REC-1
      component: MapContainer.tsx
      finding: "Silent error swallow in handlePlaceSelect and reroute .catch(() => {})"
      suggestion: "Add a toast or mapStore.setGeoError() call on route fetch failure so user knows navigation isn't starting"
      priority: should-fix-in-17.x

    - id: REC-2
      component: api/maps/directions, api/maps/geocode
      finding: "No input length/character validation on origin/destination/address before forwarding to Google"
      suggestion: "Add max-length guard (e.g., 512 chars) and reject obviously invalid inputs with 400"
      priority: should-fix-before-production

    - id: REC-3
      component: SearchBar.tsx
      finding: "onBlur uses setTimeout 150ms to allow click to register — fragile on slow devices"
      suggestion: "Use onMouseDown on list items with e.preventDefault() to prevent blur racing the click"
      priority: nice-to-have

    - id: REC-4
      component: MapContainer.tsx
      finding: "stepPath.reduce() for deviation check iterates all path points — O(n) per GPS tick"
      suggestion: "For Phase 2: use google.maps.geometry.poly.isLocationOnEdge() or limit path points checked"
      priority: nice-to-have-phase2

    - id: REC-5
      component: Coverage gap
      finding: "SearchBar, NavigationHUD, DirectionsDrawer have no automated render tests"
      suggestion: "Add React Testing Library tests for: autocomplete display, recent search list, drawer expand/collapse, HUD instruction/ETA rendering"
      priority: should-add-in-17.x

  acknowledged_good_practices:
    - "Session token lifecycle is textbook correct — getSessionToken() per keystroke, consumeSessionToken() immediately before getDetails()"
    - "navStateRef + destinationRef pattern cleanly avoids watchPosition re-registration without compromising reactivity"
    - "purgeExpired uses .returning() for accurate row count — correct Drizzle pattern"
    - "Module-level dbPromise — single IDB connection shared across renders"
    - "REROUTE_COOLDOWN_MS prevents burst rerouting — good real-world safety valve"
    - "DARK_MAP_STYLE suppresses POI noise (poi visibility:off) — good for navigation use case"
    - "stripHtml handles both tag removal and HTML entity decoding — correct for Google Directions API"
    - "fetchDirections returns typed google.maps.DirectionsResult — no loose any types in the happy path"
