gate:
  story: "8.4"
  title: "In-App Notification Bell & Drawer"
  epic: "08 — Notifications & Background Jobs"
  reviewed_by: Quinn (QA Agent)
  reviewed_at: 2026-04-14
  model: claude-sonnet-4-6
  decision: PASS
  prior_decision: CONCERNS (2026-04-14)

summary: >
  Re-review after QA fixes. All five concerns from the initial CONCERNS gate have been
  fully resolved. 14/14 ACs pass. typecheck and lint clean. 28 tests pass (20 date + 8
  service). Gate upgraded from CONCERNS → PASS. Story is ready to ship.

resolution_of_prior_concerns:
  - id: C1
    title: "Mobile bottom sheet not implemented"
    status: RESOLVED
    evidence: >
      NotificationDrawer.tsx now has a useEffect resize listener setting isMobile state
      (breakpoint < 640px, matching Tailwind sm:). SheetContent receives
      side={isMobile ? "bottom" : "right"} and h-[70vh] when on mobile.
      Initializes to false (SSR-safe); set before user can interact. Fully correct.

  - id: C2
    title: "Silent fetch errors — no error state shown"
    status: RESOLVED
    evidence: >
      fetchNotifications() now sets hasError=true in catch, renders AlertCircle +
      "Couldn't load notifications." + "Try again" button.
      handleTap() applies optimistic update then reverts isRead and unreadCount on PATCH
      failure, returns early (no navigation). handleMarkAllRead() captures previous
      snapshot, restores both notifications array and unread count on PATCH failure.
      Revert arithmetic in handleTap is correct: decrementUnread() runs first, then
      catch reads the decremented value and adds 1 back.

  - id: C3
    title: "User-isolation test doesn't verify WHERE clause content"
    status: RESOLVED
    evidence: >
      Test now asserts: expect(mockUpdateWhere).toHaveBeenCalledWith(
        expect.stringContaining(userId)
      ).
      Since eq() mock serializes as "eq:<value>", this proves the WHERE clause
      contains the userId, not just that it was called.

  - id: C4
    title: "Missing 'minutes ago' test case"
    status: RESOLVED
    evidence: >
      Added "returns '5 minutes ago' for 5 minutes" and "returns '1 minute ago' for
      1 minute (singular)" — bonus coverage of the singular edge case.

  - id: C5
    title: "as unknown as Notification type bypass"
    status: RESOLVED
    evidence: >
      Added mapNotification(row: typeof notifications.$inferSelect): Notification
      following the project's mapExpense/mapTrip pattern. Handles type cast,
      actionUrl: null → undefined, createdAt: Date → .toISOString().
      Both create() and listByUser() now use the mapper. No unsafe casts remain.

