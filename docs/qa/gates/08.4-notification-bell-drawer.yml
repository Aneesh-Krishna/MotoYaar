    probability: medium
    impact: low
    status: ACCEPTED — count refreshes on every drawer open; documented as known MVP limitation.
  - risk: "PATCH /api/notifications/[id] returns 500 for invalid UUID instead of 400"
    probability: low
    impact: low
    status: ACCEPTED — session-scoped, no security exposure; cosmetic improvement only.

