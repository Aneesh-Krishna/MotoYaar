required_fixes:
  - id: B1
    status: RESOLVED
    severity: medium
    description: >
      In buildDocumentExpiryEmailHtml(), the daysUntilExpiry === 1 branch renders
      "Expires today" — but daysUntilExpiry === 1 means the document expires TOMORROW,
      not today. Documents expiring today have daysUntilExpiry === 0, which is caught
      by the `<= 0` branch (rendering "Expired"). The label for === 1 is factually wrong
      and will confuse users receiving the email.

      Location: src/services/emailService.ts:55-56
        : doc.daysUntilExpiry === 1
          ? '<span style="color:#f97316;font-weight:600;">Expires today</span>'
    location: "src/services/emailService.ts:52-57"
    recommended_fix: >
      Change the daysUntilExpiry === 1 label to "Expires tomorrow":
        doc.daysUntilExpiry <= 0
          ? '<span style="color:#dc2626;font-weight:600;">Expired</span>'
          : doc.daysUntilExpiry === 1
            ? '<span style="color:#f97316;font-weight:600;">Expires tomorrow</span>'
            : `<span style="color:#f97316;">Expires in ${doc.daysUntilExpiry} days</span>`
    test_required: >
      Add test: "email HTML shows 'Expires tomorrow' label for daysUntilExpiry === 1"
      Setup: makeDoc(1), assert html contains "Expires tomorrow" and does NOT contain "Expires today".
      Add test: "email HTML shows 'Expires in N days' for daysUntilExpiry > 1"
      Setup: makeDoc(5), assert html contains "Expires in 5 days".

  - id: B2
    status: RESOLVED
    severity: low
    description: >
      When a user exists in the DB (emailNotificationsEnabled: true) but has no email
      address (email: null), the function returns silently with no log entry. This
      masks the failure for any user who opted into email notifications but whose
      email was never populated (e.g., users created before migration 0006 who haven't
      re-logged in yet). There is no way to detect this condition in production logs.

      Location: src/services/emailService.ts:19
        if (!user || !user.email) return;
    location: "src/services/emailService.ts:19"
    recommended_fix: >
      Split the null-return into two branches with appropriate logging:
        if (!user) return;
        if (!user.email) {
          logger.warn({ userId }, "Email notification skipped — no email address on record");
          return;
        }
    test_required: >
      Update existing test "skips email when user has no email address" to also assert
      that logger.warn is called with the userId and a message referencing no email address.

non_blocking:
  - id: NB1
    severity: low
    status: OPEN
    description: >
      vehicleName and userName are interpolated directly into the HTML template string
      without sanitization. In the email context there is no script execution risk, but
      user names or vehicle names containing < > & " chars could produce malformed HTML
      that breaks the email's visual layout in some clients (e.g. a vehicle named
      "Enfield <Custom>" would produce an unclosed tag in the doc row cell).
    location: "src/services/emailService.ts:62, 84"
    recommendation: >
      Add a minimal HTML escaper for user-supplied content before interpolation:
        function esc(s: string) {
          return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
      Then use esc(doc.vehicleName), esc(userName) in the template.
      Note: doc.type is safe — constrained by DB check to known enum values.

  - id: NB2
    severity: low
    status: OPEN
    description: >
      The cronService.ts vehicle batch lookup (db.query.vehicles.findMany) is not
      exercised by any test because all makeDoc() fixtures omit vehicleId. The
      vehicle fetch only runs when vehicleIds.length > 0, which never occurs in the
      test suite. If db.query.vehicles were undefined in the mock, tests would still
      pass. Adds a coverage gap where vehicleName enrichment is untested end-to-end.
    location: "src/services/__tests__/cronService.test.ts"
    recommendation: >
      Add a test variant where makeDoc includes vehicleId: "vehicle-1" and
      mockVehiclesFindMany returns [{ id: "vehicle-1", name: "Royal Enfield" }].
      Assert that sendDocumentExpiryEmail is called with docs containing vehicleName.
      This requires adding db.query.vehicles: { findMany: mockVehiclesFindMany } to
      the vi.mock("@/lib/db/client") factory.

  - id: NB4
    severity: very-low
    status: OPEN
    description: >
      Guard order: !user.email is checked before !user.emailNotificationsEnabled. A user
      who has explicitly opted out (emailNotificationsEnabled: false) but also has no
      email address (email: null) will receive a logger.warn ("no email on record") rather
      than a logger.info ("user opted out"). Semantically the warn is accurate — there
      is no email — but it could mildly mislead log-scanners looking for opt-out events
      who would expect a logger.info. No functional impact.
    location: "src/services/emailService.ts:19-28"
    recommendation: >
      Consider swapping the guard order: check emailNotificationsEnabled first (log info),
      then check email (log warn). This way an opted-out user always produces a consistent
      info log regardless of whether they have an email. Only worth doing if log-based
      opt-out analytics matter.

  - id: NB3
    severity: very-low
    status: OPEN
    description: >
      auth.ts changed from onConflictDoNothing to onConflictDoUpdate as a side-effect
      of this story needing to store user email. The original code had comment "F-M1:
      target googleId explicitly so username conflicts surface as real errors" — that
      intent is still preserved (conflict target remains googleId), but the behavioral
      change is worth noting for future auth reviewers. No functional regression, but
      the comment F-M1 should be updated to reflect the new upsert behaviour.
    location: "src/lib/auth.ts:30-38"
    recommendation: >
      Update F-M1 comment to: "F-M1: target googleId explicitly; updates email on
      re-login so cron jobs can reach users; username conflicts still surface as real errors."

