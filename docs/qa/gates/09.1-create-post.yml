must_fix:
  - id: D2
    severity: medium
    status: FIXED (2026-04-14)
    file: src/app/api/uploads/post-image/route.ts
    description: >
      Size validation changed to fail-closed: !size || typeof size !== "number" || size > MAX_SIZE_BYTES.
      Also removed unused `filename` destructure from request body.

  - id: D1
    severity: low
    status: FIXED (2026-04-14)
    file: src/app/api/uploads/post-image/route.ts
    description: >
      Dead ternary replaced with: const safeFilename = `${crypto.randomUUID()}.${ext}`;

advisory:
  - id: D3
    severity: low
    description: >
      Content-type in pre-signed URL is trusted from client-provided body. A user
      could claim image/jpeg but PUT arbitrary content. Acceptable for MVP.
    track_in: "Story 9.x (hardening)"

  - id: D4
    severity: low
    description: >
      Images are uploaded to R2 immediately on file selection. Abandoned forms leave
      orphaned R2 objects with no cleanup path. No lifecycle rule in place.
    track_in: "Story 8.x or infra cleanup task"

  - id: D5
    severity: low
    description: >
      zodResolver cast as any in PostForm.tsx due to Zod optional+default type mismatch.
      Can be resolved by removing .optional() from imageKeys/tags since .default([]) is sufficient.
    track_in: "Story 9.4 (edit post reuses this component)"

