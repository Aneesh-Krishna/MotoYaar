concerns:
  - id: C1
    severity: LOW
    title: "Inconsistent success UX between confirm and manual flows"
    detail: >
      Confirm screen success → setScreen("complete") shows "Document saved!" screen.
      Manual screen success → toast.success() + onSuccess() closes sheet immediately.
      Matches story spec intent but produces different user experiences.
    recommendation: "Align to single success pattern in future cleanup story."
    blocking: false

  - id: C2
    severity: ADVISORY
    title: "No unit tests for API error paths in manual handlers"
    detail: >
      handleManualSave and handleSkip catch blocks call toast.error() but
      this path is not exercised by any test. Not required by story spec.
    recommendation: "Add error path tests in future test hardening pass."
    blocking: false
    status: RESOLVED
    resolution: >
      Two tests added in DocumentUpload.test.tsx:
      "handleManualSave shows toast.error when API returns error" and
      "handleSkip shows toast.error when API returns error".
      Both verify toast.error called with server message and onSuccess not called.
      105/105 tests passing.

  - id: C3
    severity: DOCUMENTATION
    title: "Dev Notes date format inconsistency"
    detail: >
      Dev Notes reference 'd MMM yyyy' (short month) but AC 2.3 specifies
      'd MMMM yyyy' (full month). Implementation correctly follows AC.
    recommendation: "Update Dev Notes in future doc pass."
    blocking: false

