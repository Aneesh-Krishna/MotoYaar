gate:
  story: "10.1"
  slug: invite-user-to-view-vehicle
  epic: "10 — Vehicle Sharing"
  reviewed_by: Quinn (QA Agent)
  reviewed_at: "2026-04-24"
  model: claude-sonnet-4-6

decision: PASS

summary: >
  All 12 ACs addressed. Ownership checks correct and consistently applied (getByIdOwnerOnly
  throughout). DB migration complete with partial unique index for pending-invite deduplication.
  Service/email/route/page all in place. 9/9 tests pass (all story-required scenarios plus extras
  covering non-fatal email and null-email owner edge cases). pnpm typecheck and pnpm lint pass clean.

  All three defects from initial review have been resolved: email failure is now non-fatal (D1),
  self-invite correctly returns 400 BadRequestError (D2), null-email owner logs a warning instead
  of silently bypassing the check (D3).

acceptance_criteria:
  - id: AC1
    description: "Kebab menu 'Invite to view' → Manage Sharing page"
    status: PASS
    notes: "VehicleKebabMenu.tsx routes to /garage/${vehicleId}/sharing, isOwner-gated."
  - id: AC2
    description: "Manage sharing page at correct path"
    status: PASS
    notes: "src/app/(app)/garage/[id]/sharing/page.tsx created, RSC with getByIdOwnerOnly guard."
  - id: AC3
    description: "Email address input for invite"
    status: PASS
    notes: "type='email' input with required attribute in SharingPageView.tsx."
  - id: AC4
    description: "VehicleInvite record created with all required fields"
    status: PASS
    notes: >
      vehicleId, ownerUserId, inviteeEmail (lowercased), token (crypto.randomUUID()), status='pending',
      expiresAt=now+3d. Token column is text type in Drizzle schema — functionally equivalent to UUID,
      generated in application code.
  - id: AC5
    description: "Invite email sent via sendEmail() with correct subject and invite URL"
    status: PASS
    notes: >
      Subject: "You've been invited to view ${vehicleName} on MotoYaar". URL:
      https://motoyaar.app/invites/${token}. Email failure is now non-fatal — invite creation
      succeeds and error is logged.
  - id: AC6
    description: "Owner sees pending invites (email + expiry) and accepted access (name/email + date)"
    status: PASS
    notes: >
      Pending invites show email + days-remaining countdown. Accepted section from vehicle_access
      table. Empty state handled.
  - id: AC7
    description: "Self-invite validation returns 400"
    status: PASS
    notes: >
      Now throws BadRequestError → 400. Null-email owner logs a warning via logger.warn and
      skips the check (acceptable edge case with observability).
  - id: AC8
    description: "Duplicate pending invite → 409"
    status: PASS
    notes: >
      Application-level check + DB partial unique index idx_vehicle_invites_pending
      (vehicle_id, invitee_email WHERE status='pending'). Defense in depth correct.
  - id: AC9
    description: "POST /api/invites route"
    status: PASS
    notes: "Zod schema validates vehicleId (uuid) and inviteeEmail (email). Session auth checked. Returns 201."
  - id: AC10
    description: "vehicleInviteService.createInvite in correct file"
    status: PASS
    notes: "src/services/vehicleInviteService.ts."
  - id: AC11
    description: "emailService.sendVehicleInviteEmail in correct file"
    status: PASS
    notes: "src/services/emailService.ts."
  - id: AC12
    description: "pnpm typecheck and pnpm lint pass"
    status: PASS
    notes: "Both pass clean."

defects:
  - id: D1
    severity: MEDIUM
    status: RESOLVED
    title: "Email failure after DB insert creates unretriable zombie pending invite"
    resolution: >
      Email call wrapped in try/catch — failure is non-fatal. invite record is returned to caller
      regardless. Failure logged via logger.error with inviteId and inviteeEmail for observability.
      New test "returns invite record even when email delivery fails (non-fatal)" covers this path.
    files:
      - src/services/vehicleInviteService.ts
      - src/services/__tests__/vehicleInviteService.test.ts

  - id: D2
    severity: LOW
    status: RESOLVED
    title: "AC 7 self-invite returns 409 instead of specified 400"
    resolution: >
      Changed to throw BadRequestError("You cannot invite yourself") → 400. Test updated to
      expect BadRequestError.
    files:
      - src/services/vehicleInviteService.ts
      - src/services/__tests__/vehicleInviteService.test.ts

  - id: D3
    severity: LOW
    status: RESOLVED
    title: "Null-email owner silently bypasses self-invite check"
    resolution: >
      Added logger.warn({ ownerUserId }, "createInvite: owner has no email — self-invite check
      skipped") when owner.email is null. New test "skips self-invite check and logs warning when
      owner has no email" covers this path.
    files:
      - src/services/vehicleInviteService.ts
      - src/services/__tests__/vehicleInviteService.test.ts

informational:
  - "Token returned in POST /api/invites response (invite.token). Advisory: strip token from API response to reduce unnecessary exposure."
  - "vehicleName interpolated directly into email HTML without escaping. Low risk since vehicle names are validated at input."
  - "SharingPage calls getByIdOwnerOnly for vehicle object AND both listAccess/listPendingInvites call it internally — 3 ownership DB checks per page load (all parallel). Minor inefficiency only."
  - "SharingPageView imports VehicleInviteRecord/VehicleAccessRecord from service layer. Advisory: promote shared types to @/types for cleaner layer separation."
  - "listPendingInvites returns DB-status='pending' records without filtering by expiresAt. Expired-but-not-yet-swept invites will appear in the list. Acceptable until a cron expiry job marks them expired."
  - "Pre-existing test failures in src/components/expenses/__tests__/ExpenseForm.test.tsx (10 tests) confirmed as not introduced by this story."

risks:
  - area: "Invite delivery reliability"
    level: LOW
    note: "Email failure is now non-fatal — invite is created and failure logged. Owner can retry without hitting 409."
  - area: "Ownership enforcement"
    level: LOW
    note: "getByIdOwnerOnly used consistently in service and RSC. No IDOR risk found."
  - area: "Token security"
    level: LOW
    note: "crypto.randomUUID() provides 122 bits of entropy — sufficient for invite tokens."
  - area: "Duplicate invite race condition"
    level: LOW
    note: "Application-level duplicate check + DB partial unique index provide defense in depth."
