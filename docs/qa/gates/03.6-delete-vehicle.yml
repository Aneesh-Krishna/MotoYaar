      F2: "PASS — VehicleKebabMenu.test.tsx — 5 tests with proper mocks, beforeEach clearAllMocks, covers owner gate / modal open / success path / ApiError path."
      F3: "PASS — vehicleService.test.ts — storedDocs loop fully covered; deleteFile asserted for both doc URLs."
    new_advisory:
      F6: "TEST METHODOLOGY — ConfirmModal Escape test (ConfirmModal.test.tsx:48-54) uses fireEvent.keyDown on dialog element which does not trigger Radix's document-level onEscapeKeyDown handler. Test passes as false positive. The implementation is correct; document-level simulation would require userEvent.keyboard('{Escape}') at document scope. Low priority given fix code is sound."

findings:
  F1:
    severity: must-fix
    title: "ConfirmModal dismisses via Escape/backdrop during in-flight delete"
    location: "src/components/ui/ConfirmModal.tsx:32"
    detail: >
      onOpenChange fires when user presses Escape or clicks backdrop even when isLoading=true.
      Buttons are disabled but Radix built-in close triggers are not blocked. Modal hides while
      delete is still in flight; router.push('/garage') fires on success causing a confusing
      redirect the user did not expect after "cancelling".
    fix: >
      Add onInteractOutside and onEscapeKeyDown event prevention to DialogPrimitive.Content
      when isLoading=true. Pass isLoading as prop from VehicleKebabMenu → ConfirmModal
      (already available) into the Content element handlers.

  F2:
    severity: must-fix
    title: "No unit tests for modified VehicleKebabMenu"
    location: "src/components/vehicles/VehicleKebabMenu.tsx"
    detail: >
      VehicleKebabMenu gained stateful delete logic (useState, async handleDelete, error
      handling, ConfirmModal integration, router redirect) with zero unit tests.
      Violates project convention for tested components.
    fix: >
      Add tests: (1) Delete option absent when isOwner=false, (2) Delete option present
      when isOwner=true, (3) ConfirmModal shown on Delete click. Mock deleteVehicle,
      useRouter, and toast.

  F3:
    severity: concern
    title: "Missing test for document R2 file deletion"
    location: "src/services/__tests__/vehicleService.test.ts"
    detail: >
      vehicleService.delete tests cover vehicle image R2 deletion and viewer notifications
      but do not verify storageService.deleteFile is called for documents with storageUrl.
      The storedDocs loop (vehicleService.ts:259-265) is untested.
    fix: >
      Add test: mock documents.findMany to return [{id, storageUrl: 'url1'}, ...],
      assert storageService.deleteFile called with each storageUrl.

  F4:
    severity: advisory
    title: "Sequential for-await loops for R2 and notifications"
    location: "src/services/vehicleService.ts:259-276"
    detail: >
      Serial awaits for document R2 deletions and viewer notifications.
      Promise.allSettled() would parallelise when services are real.
    fix: "Replace for-await loops with Promise.allSettled() in Story 1.3 / 8.x."

  F5:
    severity: advisory
    title: "imageUrl passed as R2 storage key — forward-compat risk"
    location: "src/services/vehicleService.ts:255"
    detail: >
      storageService.deleteFile receives full CDN URL (imageUrl) not an object key.
      Story 1.3 will likely require a storage key. Acknowledged in completion notes.
    fix: "Add imageKey column to vehicles schema in Story 1.3 and update delete accordingly."

