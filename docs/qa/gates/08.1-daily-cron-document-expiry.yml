required_fixes:
  - id: R1
    status: RESOLVED
    severity: medium
    description: >
      Notification body text misleads when a user has both warning docs and expired docs
      in the same cron batch.

      Location: cronService.ts:138-147
        const allDocs = [...warningDocs, ...expiredDocs];
        const docNames = allDocs.map((d) => d.type).join(", ");
        const body = hasExpired
          ? `Your ${docNames} has expired. Please renew.`
          : `Your ${docNames} is expiring soon.`;

      When hasExpired=true, docNames includes BOTH warningDocs and expiredDocs.
      Example: user has Insurance (expiring in 10 days, warning) and PUC (expired yesterday).
      Message becomes: "Your Insurance, PUC has expired. Please renew." — incorrectly
      stating Insurance has expired when it has not.
    location: "src/services/cronService.ts:138-147"
    recommended_fix: >
      Split docNames into two sets. Compose the body to reflect reality:
        const expiredNames = expiredDocs.map(d => d.type).join(", ");
        const warningNames = warningDocs.map(d => d.type).join(", ");
        let body: string;
        if (expiredDocs.length > 0 && warningDocs.length > 0) {
          body = `Your ${expiredNames} has expired. ${warningNames} is expiring soon.`;
        } else if (expiredDocs.length > 0) {
          body = `Your ${expiredNames} has expired. Please renew.`;
        } else {
          body = `Your ${warningNames} is expiring soon.`;
        }
    test_required: >
      Add test: "notification body correctly distinguishes expired from warning docs"
      Setup: user has one warning doc (Insurance, +5 days) and one expired doc (PUC, -1 day).
      Assert: notificationService.create called with body containing both "PUC has expired"
      and "Insurance is expiring soon" — NOT saying Insurance has expired.

  - id: R2
    status: RESOLVED
    severity: medium
    description: >
      Test "continues processing after one document throws an error" passes for the
      wrong reason — the catch block is never actually exercised.

      Test uses expiryDate: "invalid-date". In cronService.ts:
        const expiryDate = new Date("invalid-date");  // → Invalid Date object (no throw)
        const daysUntilExpiry = Math.ceil(NaN / MS_PER_DAY);  // → NaN (no throw)

      NaN comparisons (NaN < 0, NaN > 0, NaN === 0) all evaluate to false. The bad doc
      is silently skipped without entering any branch — the try/catch is never triggered.
      The test passes because the good doc still executes, but this gives false confidence
      that the catch block actually protects against real errors (e.g., db.update throwing).
    location: "src/services/__tests__/cronService.test.ts:212-224"
    recommended_fix: >
      Replace the invalid-date approach with a real error simulation. Mock db.update
      to throw for the first doc but succeed for the second:
        // Make db.update throw for bad-doc only
        const { db } = await import("@/lib/db/client");
        vi.mocked(db.update).mockImplementationOnce(() => {
          throw new Error("DB connection lost");
        });
      Then assert: loggerError called with the bad doc's id, AND notification still sent
      for the good doc. This actually exercises the catch block.
    test_required: >
      Rewrite test "continues processing after one document throws an error" to simulate
      a real db.update failure for one doc and confirm (a) logger.error is called with
      the failing docId, and (b) the subsequent good doc is still processed end-to-end.

  - id: R3
    status: RESOLVED
    severity: low
    description: >
      After R2 deletion, storageUrl is set to null but storageKey is left unchanged,
      creating a dangling reference to a deleted R2 object.

      Location: cronService.ts:82-84
        await db.update(documents)
          .set({ storageUrl: null })  ← storageKey not cleared
          .where(eq(documents.id, doc.id));

      While this does not cause an immediate correctness bug (the guard is doc.storageUrl),
      any future code that reads storageKey to determine whether a file exists in R2 would
      incorrectly conclude the file is present after deletion.
    location: "src/services/cronService.ts:82-84"
    recommended_fix: >
      Clear both fields atomically:
        await db.update(documents)
          .set({ storageUrl: null, storageKey: null })
          .where(eq(documents.id, doc.id));
    test_required: >
      Update existing test "deletes R2 file when expired > 10 days ago" to also assert:
        expect(mockUpdate.set).toHaveBeenCalledWith({ storageUrl: null, storageKey: null });

  - id: R4
    status: RESOLVED
    severity: low
    description: >
      AC6 specifies that step 4 (expiry-day notification) must NOT fire if
      expiryNotifiedAt is already set — "AND expiry_notified_at IS NULL". The test
      suite covers the equivalent guard for expiryWarningNotifiedAt (step 3) but has
      no corresponding test for expiryNotifiedAt (step 4). The implementation appears
      correct, but the guard is untested.
    location: "src/services/__tests__/cronService.test.ts (missing)"
    recommended_fix: null
    test_required: >
      Add test: "does not send expiry-day notification when expiryNotifiedAt is already set"
      Setup: doc with expiryDate = today (daysFromNow(0)) and expiryNotifiedAt: new Date().
      Assert: notificationService.create NOT called, expiryNotifiedAt NOT updated again.

non_blocking:
  - id: NB1
    severity: low
    status: RESOLVED
    description: >
      CRON_SECRET undefined security gap. If the env var is missing, the auth check
      becomes: authHeader !== "Bearer undefined". An attacker sending
      "Authorization: Bearer undefined" would pass authentication.
    location: "src/app/api/cron/document-expiry/route.ts:6"
    recommendation: >
      Add an explicit guard:
        if (!process.env.CRON_SECRET || authHeader !== `Bearer ${process.env.CRON_SECRET}`) {
          return NextResponse.json({ error: "Unauthorized" }, { status: 401 });
        }
      Also add a test: "returns 401 when CRON_SECRET env var is not set".

  - id: NB2
    severity: low
    status: RESOLVED
    description: >
      Non-410 push send errors are silently swallowed with no logging. The .catch()
      inside subscriptions.map() only handles statusCode 410; all other error codes
      are consumed without any trace. Same pattern flagged in Story 7.5 NB2.
    location: "src/services/cronService.ts:160-165"
    recommendation: >
      Add an else branch in the per-subscription .catch():
        .catch(async (err: { statusCode?: number }) => {
          if (err.statusCode === 410) {
            await pushService.deleteSubscription(sub.endpoint);
          } else {
            logger.warn({ err, endpoint: sub.endpoint, userId: user.id }, "Push send failed");
          }
        })

  - id: NB3
    severity: very-low
    status: RESOLVED
    description: >
      When a user has only warning docs (no expired docs), the body says
      "Your Insurance is expiring soon." using singular "is" even for multiple docs.
      Minor grammar inconsistency when warningDocs.length > 1.
    recommendation: >
      Add pluralization: warningDocs.length > 1 ? "are expiring" : "is expiring".

  - id: NB4
    severity: very-low
    status: OPEN
    description: >
      Unused MS_PER_DAY constant in test file. cronService.test.ts line 79 declares
      `const MS_PER_DAY = 86_400_000` but it is never referenced anywhere in the test
      helpers or assertions — daysFromNow() uses Date arithmetic directly.
    location: "src/services/__tests__/cronService.test.ts:79"
    recommendation: Remove the unused constant to keep the test file clean.

  - id: NB5
    severity: very-low
    status: OPEN
    description: >
      Dead variable in R1 body-text test. The test at line 310 declares `expiredDoc`
      (makeDoc with type "PUC", expiryDate daysFromNow(-1)) but never passes it to
      mockDocsFindMany — the mock uses [warningDoc, todayDoc] only. The variable and
      its comment are misleading.
    location: "src/services/__tests__/cronService.test.ts:313-318"
    recommendation: Remove the dead expiredDoc declaration and its stale comment.

