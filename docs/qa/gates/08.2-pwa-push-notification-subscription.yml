required_fixes:
  - id: R1
    status: RESOLVED
    severity: medium
    description: >
      usePushSubscription.subscribe() does not check the HTTP response from POST /api/push/subscribe.
      After fetch() resolves, the code proceeds to return true unconditionally — even if the server
      returns 401 (session expired), 400 (bad subscription object), or 500 (DB error).

      Location: src/hooks/usePushSubscription.ts:31-35
        const subscription = await subscribeToPush();
        if (!subscription) return false;

        await fetch("/api/push/subscribe", {   ← response never inspected
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(subscription.toJSON()),
        });
        return true;   ← returned true even if fetch returned 4xx/5xx

      Impact: The user sees "push enabled" but has no subscription in the DB.
      On next app close, document expiry push notifications will silently not arrive.
    location: "src/hooks/usePushSubscription.ts:31-35"
    recommended_fix: >
      Check res.ok before returning true:
        const res = await fetch("/api/push/subscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(subscription.toJSON()),
        });
        if (!res.ok) {
          console.error("Failed to save push subscription:", res.status);
          return false;
        }
        return true;
    test_required: >
      Add test to usePushSubscription.test.ts:
      "subscribe() returns false when API returns non-2xx"
      Setup: mock fetch to return { ok: false, status: 401 }; mock Notification.requestPermission
      to return "granted"; mock subscribeToPush to return a fake PushSubscription.
      Assert: subscribe() returns false.

non_blocking:
  - id: NB1
    severity: low
    status: OPEN
    description: >
      No user feedback when subscribe() returns false (permission denied, SW unavailable,
      or API failure). PushPermissionPrompt.handleEnable() calls onComplete() regardless of
      the subscribe() return value. The user is silently navigated away with no indication
      that push was not enabled.

      Location: src/components/notifications/PushPermissionPrompt.tsx:13-16
        const handleEnable = async () => {
          await subscribe();   ← return value discarded
          onComplete();
        };
    recommendation: >
      Consider using the return value to show a brief toast or inline message:
        const success = await subscribe();
        if (!success && permissionState !== "denied") {
          // show "Couldn't enable notifications" message
        }
        onComplete();
      AC3 doesn't mandate a success message, so this is advisory only.

  - id: NB2
    severity: low
    status: OPEN
    description: >
      pushService.deleteSubscription(endpoint) deletes by endpoint alone without scoping
      by userId. The schema's unique constraint is on (userId, endpoint) — not endpoint alone
      — so theoretically two users could share an endpoint value, and a stale-subscription
      deletion in one user's context would delete the other user's row.

      In practice, browser push endpoints are globally unique per registration, so collision
      is effectively impossible. But the function is semantically imprecise.

      Location: src/services/pushService.ts:34-38
    recommendation: >
      Consider adding userId parameter:
        async deleteSubscription(userId: string, endpoint: string): Promise<void> {
          await db.delete(pushSubscriptions)
            .where(and(eq(pushSubscriptions.userId, userId), eq(pushSubscriptions.endpoint, endpoint)));
        }
      Update call site in cronService.ts accordingly. Advisory only.

  - id: NB3
    severity: very-low
    status: OPEN
    description: >
      PushPermissionPrompt has no backdrop overlay. The component uses fixed inset-0 z-50
      but without a semi-transparent background, the WalkthroughModal behind it is visible,
      creating a layered visual that looks unpolished on mobile (bottom sheet over another modal).

      Location: src/components/notifications/PushPermissionPrompt.tsx:24
    recommendation: >
      Add a backdrop: replace the outer div's className with
      "fixed inset-0 z-50 flex items-end justify-center sm:items-center bg-black/40 backdrop-blur-sm"
      to match the WalkthroughModal pattern.

