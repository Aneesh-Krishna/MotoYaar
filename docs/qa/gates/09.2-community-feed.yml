defects:
  - id: D1
    severity: MUST_FIX
    title: "Missing try/catch in async UI operations causes stuck loading states"
    file: "src/components/community/CommunityFeedView.tsx"
    detail: >
      handleRefresh, loadMorePosts, and sort/tag useEffect all lack error
      handling. On API failure, isRefreshing/isLoadingMore/isLoading are
      permanently stuck true — UI never recovers without full page reload.

  - id: D2
    severity: MUST_FIX
    title: "parseInt NaN not guarded in GET /api/posts page param"
    file: "src/app/api/posts/route.ts"
    detail: >
      parseInt("abc", 10) returns NaN. (NaN - 1) * 20 = NaN causes
      slice(NaN, NaN) to return [] silently. Should validate and clamp to 1.

  - id: D3
    severity: SHOULD_FIX
    title: "No error state displayed to user on fetch failure"
    file: "src/components/community/CommunityFeedView.tsx"
    detail: >
      After fixing D1, failed fetches should render an error banner with
      retry action rather than leaving the user with a blank/empty feed.

advisories:
  - id: A1
    title: "Excluded hidden posts test is structural, not behavioural"
    note: >
      Test verifies findMany receives a where clause but not its content.
      Inherent mock limitation — acceptable for unit tests.

  - id: A2
    title: "sort query param unvalidated server-side"
    note: "Invalid sort values silently fall through to newest-sort behavior."

  - id: A3
    title: "Tag filter test is structural only"
    note: "Cannot verify actual SQL tag filter content via DB mock."

  - id: A4
    title: "PostCard tag chip count: spec says 3, implementation shows 4"
    note: "Cosmetic discrepancy. Harmless."

