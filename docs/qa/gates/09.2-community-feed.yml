gate:
  story: "9.2"
  epic: "09 — Community"
  slug: community-feed
  title: "Community Feed (Trending & Newest)"
  decision: PASS
  reviewed_by: Quinn (QA Agent)
  reviewed_at: "2026-04-14"
  model: claude-sonnet-4-6

summary: >
  Functionally complete across all 15 ACs. Hot score algorithm, DB filtering,
  sorting, pagination, infinite scroll, and guest access are all correctly
  implemented. Typecheck and lint clean. 13/13 tests pass.
  Gate held at CONCERNS due to missing error handling in async UI operations
  (D1) and silent NaN in page param (D2) — both straightforward fixes.

