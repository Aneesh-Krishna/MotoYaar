nfr_validation:
  security:
    status: PASS
    notes: >
      All 3 endpoints guarded with getSession(). runGeneration validates reportId+userId
      (no IDOR). expenseSnapshot assembled from structured data — low prompt injection risk.
      periodLabel user-derived but stored as text only, not executed.
  performance:
    status: PASS
    notes: >
      checkQuota uses findMany instead of count(*) — negligible at MVP (max 1 row/user/month).
      Fire-and-forget pattern ensures POST /api/reports/ai returns immediately.
      AI generation runs in separate HTTP request lifecycle.
  reliability:
    status: PASS
    notes: >
      runGeneration catch block sets status=failed on any error — no silent failures.
      Null guard added for missing expenseSnapshot. Idempotency: runGeneration returns
      early if status != 'pending', preventing double-generation.
  maintainability:
    status: PASS
    notes: >
      FREE_REPORTS_PER_MONTH constant centralised in service. freePerMonth in quota
      response avoids constant duplication across client/server. Clean separation of
      requestReport (creates record) vs runGeneration (does AI work).

