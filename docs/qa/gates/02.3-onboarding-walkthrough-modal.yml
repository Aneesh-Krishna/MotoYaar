resolved_items:
  - id: QA-2.3-01
    status: RESOLVED
    verification: >
      markWalkthroughSeen logic moved inline in handleAction, wrapped in
      try/catch. res.ok checked; failure logged via console.error.
      router.push("/") in finally block — user always redirects, never stranded.

  - id: QA-2.3-02
    status: RESOLVED
    verification: >
      saving state (useState<boolean>) added to WalkthroughPage.
      setSaving(true) before fetch, setSaving(false) in finally.
      disabled={saving} passed to WalkthroughModal; Skip, Next, and
      Get started buttons all respect disabled prop with opacity + cursor styles.
      "Get started" shows "Saving..." label while in-flight.

  - id: QA-2.3-04
    status: RESOLVED
    verification: >
      custom={direction} removed from both AnimatePresence motion.div children
      in WalkthroughModal.tsx. Animations use direction from closure directly.

  - id: QA-2.3-05
    status: RESOLVED
    verification: >
      useSession().update() called after res.ok in handleAction.
      JWT session now reflects walkthroughSeen=true immediately after PATCH,
      preventing stale-token issues in Story 2.4.

