# ─── Review 2: Post-implementation (2026-03-19) ──────────────────────────────

post_implementation_review:
  reviewed_at: "2026-03-19"
  review_type: POST_IMPLEMENTATION
  decision: PASS

  summary: >
    Post-implementation review. Story is functionally complete: 13/13 ACs
    addressed, 35/35 tests passing, typecheck and lint clean. All HIGH/MEDIUM/LOW
    findings resolved: F1 (<button>/<Link> nesting in EmptyState), F2 (kind
    discriminator on RecentActivity), F3 (DRY — now imports getDocumentStatus
    from utils). Same FAB defect in Story 3.1 also fixed in the same pass.
    AC 7 (Recent Activity) intentionally stubbed pending Epic 05.

  findings:
    - id: F1
      severity: HIGH
      status: RESOLVED
      resolved_at: "2026-03-19"
      resolution: "Removed <button>; styles moved directly to <Link> in EmptyState"
      title: "<button> nested inside <Link> in EmptyState — invalid HTML"
      file: "src/app/(app)/page.tsx"
      lines: "162-166"
      detail: >
        EmptyState wraps a <button> inside <Link> (which renders as <a>).
        Interactive element inside interactive element — invalid HTML per spec.
        Keyboard users may double-tab; screen readers announce both elements.
        Same pattern as Story 3.1 FAB F1 (also unfixed). Fix: remove inner
        <button>, apply all styles directly to <Link> (className, hover states).

    - id: F2
      severity: MEDIUM
      status: RESOLVED
      resolved_at: "2026-03-19"
      resolution: "kind: 'expense' | 'trip' added to RecentActivity type in src/types/index.ts"
      title: "RecentActivity type lacks kind discriminator for trip vs expense icon"
      file: "src/types/index.ts"
      detail: >
        RecentActivity = Expense & { vehicleName } has no 'kind' field to
        distinguish expenses vs trips when Epic 05 adds trip activity. The icon
        logic in RecentActivitySection (always IndianRupee) will need to branch.
        Add kind: 'expense' | 'trip' to RecentActivity before Epic 05
        implements the real query, or define a union type at that point.

    - id: F3
      severity: LOW
      status: RESOLVED
      resolved_at: "2026-03-19"
      resolution: "Removed local deriveDocumentStatus(); now imports getDocumentStatus() from @/lib/utils"
      title: "deriveDocumentStatus() duplicates getDocumentStatus() from utils.ts"
      file: "src/services/vehicleService.ts"
      lines: "6-15"
      detail: >
        The local deriveDocumentStatus() reimplements logic already in
        src/lib/utils.ts:getDocumentStatus(). Minor DRY gap; divergence risk
        if notification window becomes per-user configurable
        (User.notificationWindowDays). Import from utils instead. Follow-on.

    - id: F4
      severity: LOW
      status: OPEN
      title: "IST midnight edge: Intl.DateTimeFormat hour12:false may return '24'"
      file: "src/app/(app)/page.tsx"
      lines: "18-23"
      detail: >
        Some Node/V8 environments return "24" for midnight with hour12:false.
        parseInt("24") = 24 → "Good night" (correct, but fragile). Add
        hour = hour % 24 clamp after parseInt, or a clarifying comment.

    - id: F5
      severity: INFO
      status: OPEN
      title: "No React.cache() on vehicleService queries"
      file: "src/services/vehicleService.ts"
      detail: >
        Three parallel DB queries fire on every dashboard navigation without
        deduplication. Wrapping listByUser() with React.cache() would
        deduplicate calls within the same RSC render tree. Follow-on for
        Epic 05+ when data volume matters.

  acceptance_criteria:
