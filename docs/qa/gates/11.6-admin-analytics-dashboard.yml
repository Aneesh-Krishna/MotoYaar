defects:
  - id: D1
    severity: HIGH
    status: RESOLVED
    required: true
    title: "Missing unit tests for getAnalytics() — required by story Testing Requirements"
    description: >
      Story specifies 5 unit test cases for adminService.getAnalytics():
      totalUsers count, newUsersThisWeek count, parse success rate calculation,
      parse success rate when no documents (100%), and weekly signups shape.
      None existed in initial implementation.
    resolution: >
      Created src/services/__tests__/adminService.analytics.test.ts with all 5 required
      test cases plus makeChain fluent mock helper. Uses vi.spyOn for helper methods
      and mockReturnValueOnce for ordered db.select calls. 5/5 passing.
    files:
      - src/services/__tests__/adminService.analytics.test.ts

  - id: D2
    severity: MEDIUM
    status: OPEN
    required: false
    title: "Badge count only reflects hidden posts, not 3+-report queue items"
    description: >
      pendingReportsCount counts postReport rows for posts where isHidden = true.
      getReportedPosts() (the moderation page) surfaces posts where
      isHidden OR reports.length >= 3. The badge shows 0 when the moderation
      queue has un-hidden posts with 3+ reports — the primary moderation targets.
      Implementation faithfully follows the story spec query; this is a spec-level gap.
    fix: >
      Option A: Update getPendingReportsCount() to COUNT DISTINCT posts where
      isHidden = true OR report count >= 3 (matches moderation page logic).
      Option B: PO confirms badge should only reflect hidden posts (current spec).
    files:
      - src/services/adminService.ts

  - id: D3
    severity: LOW
    status: OPEN
    required: false
    title: "Duplicate pending count query on dashboard page load"
    description: >
      Admin layout calls getPendingReportsCount() on every page. Dashboard page
      calls getAnalytics() which runs the same inner count query. On /admin,
      the same DB query fires twice. Acceptable at this scale; minor cleanup opportunity.
    fix: "Pass pendingCount from layout into children via a slot or React context, or accept the redundancy."
    files:
      - src/app/admin/layout.tsx
      - src/services/adminService.ts

informational:
  - "Helper methods prefixed _ (e.g. _getParseSuccessRate) — no true privacy in plain object; acceptable for service singletons"
  - "as unknown as Array<...> casts on db.execute() results — necessary workaround for postgres.js RowList type; correct runtime behavior"
  - "newUsersThisWeek uses rolling 7-day window, not calendar ISO week start — documented deviation, spec explicitly allows it"
  - "Pre-existing ExpenseForm test failures (10 tests) — unrelated to this story"

