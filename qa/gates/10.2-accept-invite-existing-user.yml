open_items:
  - id: C1
    severity: medium
    title: "No email-match guard in acceptInvite — any authenticated user can claim invite by URL"
    status: RESOLVED
    detail: >
      acceptInvite(token, userId) does not verify that the logged-in user's email matches
      invite.inviteeEmail. Any authenticated MotoYaar user who obtains the token URL (e.g. via
      forwarded email, link preview, or browser history) can claim the invite regardless of
      whether they are the intended recipient. Risk is limited to link exposure scenarios but
      is worth closing with an email-match check before the feature reaches broad use.
    recommendation: >
      Add: if (invite.inviteeEmail !== userEmail) throw new ForbiddenError('This invite was sent to a different email address.');
      Requires passing userEmail into acceptInvite or fetching from the users table inside the method.

  - id: C2
    severity: low
    title: "Post-login redirect loses invite context for unauthenticated existing users"
    status: RESOLVED
    detail: >
      When an existing user arrives at /invites/[token] without a session, they are redirected to
      /login?inviteToken=[token]. The login page does not read this param or redirect back to the
      invite URL after authentication. The user lands on the default post-login page and must
      click the email link a second time to complete acceptance. Story does not explicitly require
      handling this case, but it is a meaningful UX gap for users who are logged out.
    recommendation: >
      In the login page's post-auth redirect logic, check for inviteToken param and redirect to
      /invites/[token] after successful authentication.

  - id: C3
    severity: info
    title: "Garage FAB ('Add Vehicle') shown when user has only shared vehicles"
    status: ACKNOWLEDGED
    detail: >
      The FAB in garage/page.tsx is rendered whenever !isEmpty (i.e. any vehicles exist).
      A user with zero owned vehicles but one or more shared vehicles sees the floating
      'Add Vehicle' button, which is correct behavior (they can still add their own vehicle)
      but may be slightly unexpected. Not a bug.

  - id: C4
    severity: info
    title: "Revoked invite status not checked in acceptInvite"
    status: ACKNOWLEDGED
    detail: >
      acceptInvite only guards against status='accepted' and expiry. If a 'revoked' status
      is added in future stories, a revoked invite could be accepted until that check is added.
      No revoked status exists in the current schema, so this is a forward-looking note only.

resolved_concerns:
  - id: C1
    title: "No email-match guard in acceptInvite"
    resolution: >
      vehicleInviteService.acceptInvite now fetches db.query.users.findFirst({ where: eq(users.id, userId) })
      after expiry check. If user has no email or user.email.toLowerCase() !== invite.inviteeEmail,
      throws ForbiddenError("This invite was sent to a different email address.").
      Tests added: email mismatch → ForbiddenError, null email → ForbiddenError,
      case-insensitive match → success, email matches → full happy path passes.

  - id: C2
    title: "Post-login redirect loses invite context"
    resolution: >
      Login page refactored: GoogleSignInButton component reads inviteToken from useSearchParams(),
      builds callbackUrl as /invites/[token] when present else /. Wrapped in <Suspense fallback={null}>
      per Next.js App Router requirement. signIn("google", { callbackUrl }) now routes user
      back to invite acceptance page automatically after authentication.

risks: []

recommendations:
  - "Add VehicleKebabMenu isOwner prop check for 'Delete' option if it is rendered for shared vehicle viewers in a future story"
  - "Consider adding a 'Shared' badge to VehicleCard in the shared section for visual differentiation"
