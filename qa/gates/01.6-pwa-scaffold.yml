# ─── Concerns ────────────────────────────────────────────────────────────────
concerns:
  - id: C1
    severity: medium
    title: Generated SW files not in .gitignore
    detail: |
      pnpm build generates public/sw.js and public/workbox-{hash}.js.
      .gitignore does not exclude these. Build artifacts should not be committed —
      the workbox hash changes on every build creating noisy diffs.
    recommendation: "Add to .gitignore: public/sw.js and public/workbox-*.js"
    blocking: true

  - id: C2
    severity: low
    title: Task 4.1 overstates cache strategy implementation
    detail: |
      Task 4.1 checkbox marked [x] with description "Configure next-pwa with cache strategies
      from Dev Notes". The 4 runtimeCaching strategies (network-first for API, cache-first for
      images, network-only for documents) were NOT implemented — only basic dest/register/skipWaiting.
      AC2 is still met (app shell caching works by default), but the task description misleads
      future maintainers about what was actually configured.
    recommendation: "Either add runtimeCaching config or update task 4.1 notes to clarify default behaviour was accepted"
    blocking: false

  - id: C3
    severity: low
    title: AC checkboxes not marked in story file
    detail: "All 6 AC items remain unchecked (- [ ]) despite all being verified complete."
    recommendation: "Mark AC checkboxes [x] before closing story"
    blocking: true

# ─── Info / Non-blocking ─────────────────────────────────────────────────────
info:
  - id: I1
    title: setVapidDetails called per invocation
    detail: |
      sendPushNotification calls setVapidDetails on every call, mutating global web-push state.
      Harmless at MVP scale. When the notification API route is built (future story), consider
      calling setVapidDetails once at module initialisation in the server-side route handler.

  - id: I2
    title: apple-touch-icon absent
    detail: "Lighthouse flagged missing apple-touch-icon. Deferred to Story 8.2 per Dev Notes — acceptable."

# ─── Summary ─────────────────────────────────────────────────────────────────
summary: |
  Story 1.6 meets all 6 acceptance criteria. PWA is installable, service worker is active,
  VAPID infrastructure is in place, push.ts scaffold is correctly structured with client/server
  separation, and typecheck passes.
  All blocking concerns resolved 2026-03-15:
  - C1: public/sw.js and public/workbox-*.js added to .gitignore
  - C2: runtimeCaching deferral documented in completion notes
  - C3: All 6 AC checkboxes marked [x]
  Story is clear to merge.
